<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This is the page I'm building for White Water Rafting in the WDD 130 course at BYU-I about Web fundamentals">
    <meta name="author" content="Helamã Vieira">
    <title>Contact- White Water Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="images/rafting-logo.png" alt="rafting-logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="hero2">

            <h1>WHITE WATER RAFTING</h1>
            <div class="address">
                <p>123 Main River Street</p>
                <p>Kolob, California</p>
                <p>+1 999 999 9999</p>
                <p>info@whitewater.com</p>
            </div>
        </div>


        <div class="map-container">
            <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d2585.734900418477!2d14.867196976224541!3d49.60274847144273!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1spt-BR!2scz!4v1780649933607!5m2!1spt-BR!2scz" width="600" height="450" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>



        <div class="form-container">
            <form>
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Placeholder">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Placeholder">
                </div>

                <div class="form-group">
                    <label>Message Purpose</label>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="purpose" value="general" checked>General Inquiry</label>
                        <label>
                            <input type="radio" name="purpose" value="reservation">Reservation Question</label>
                        <label>
                            <input type="radio" name="purpose" value="suggestion">Website Suggestion</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" placeholder="Type here"></textarea>
                </div>

                <div class="checkbox-group">
                    <label style="width:auto;">
                        <input type="checkbox" checked>
                        Please Subscribe me to the monthly newsletter
                    </label>
                </div>

                <button type="submit" class="submit-btn">Get in Touch!</button>
            </form>
        </div>

        <div class="employees">
            <h1>We are here to serve you</h1>

            <figure>
                <img src="images/e-greg.jpg" alt="employee 1">
                <figcaption>Greg</figcaption>
            </figure>

            <figure>
                <img src="images/e-julia.jpg" alt="employee 2">
                <figcaption>Julia</figcaption>
            </figure>            
            <figure>
                <img src="images/e-joao.jpg" alt="employee 3">
                <figcaption>João</figcaption>
            </figure>

            

        </div>

    </main>

    <footer>
        <p>©️2026 ❖ WHITE WATER RAFTING ❖ Helamã Vieira</p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.svg" alt="LinkedIn Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="Instagram Icon">
            </a>
        </nav>
    </footer>
</body>
</html>
